name: CI/CD ML Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Run actions/checkout@v3
        uses: actions/checkout@v3

      - name: Set up Python 3.12.7
        uses: actions/setup-python@v4
        with:
          python-version: '3.12.7'

      - name: Check Env
        run: python --version

      - name: Install dependencies
        run: |
          pip install mlflow dagshub pandas scikit-learn docker

      - name: Set MLflow Tracking URI
        run: echo "MLFLOW_TRACKING_URI=${{ secrets.MLFLOW_TRACKING_URI }}" >> $GITHUB_ENV

      - name: Run mlflow project
        run: |
      - name: Run mlflow project
        run: |
          # Jalankan mlflow run dan tangkap output-nya untuk mencatat Run ID aktif
          mlflow run ./MLProject --env-manager=local
        env:
          MLFLOW_TRACKING_URI: https://dagshub.com/rinimayasari2202/Workflow-CI.mlflow
          MLFLOW_TRACKING_USERNAME: ${{ secrets.MLFLOW_TRACKING_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.MLFLOW_TRACKING_PASSWORD }}

      - name: Build Docker Model from Active Run
        env:
          MLFLOW_TRACKING_URI: https://dagshub.com/rinimayasari2202/Workflow-CI.mlflow
          MLFLOW_TRACKING_USERNAME: ${{ secrets.MLFLOW_TRACKING_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.MLFLOW_TRACKING_PASSWORD }}
        run: |
          python -c "
          import mlflow
          # Mengambil run yang paling mutakhir dan dipastikan memiliki artefak model
          runs = mlflow.search_runs(
              order_by=['start_time DESC'],
              max_results=3
          )
          
          target_run_id = None
          for idx, row in runs.iterrows():
              try:
                  client = mlflow.tracking.MlflowClient()
                  artifacts = client.list_artifacts(row.run_id)
                  if any(art.path == 'model' for art in artifacts):
                      target_run_id = row.run_id
                      break
              except Exception:
                  continue
          
          if not target_run_id:
              raise Exception('Gagal menemukan run yang memiliki artefak model!')
              
          print(f'Menggunakan Run ID yang memiliki artefak model valid: {target_run_id}')
          
          import mlflow.models.python_api as mlflow_api
          mlflow_api.build_docker(
              model_uri=f'runs:/{target_run_id}/model',
              name='my-model-image',
              env_manager='local'
          )
          "
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Tag and Push Docker Image
        run: |
          docker tag my-model-image:latest ${{ secrets.DOCKERHUB_USERNAME }}/my-model-image:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/my-model-image:latest