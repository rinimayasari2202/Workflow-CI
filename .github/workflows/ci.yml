name: CI/CD ML Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Run actions/checkout@v3
        uses: actions/checkout@v3

      - name: Set up Python 3.12.7
        uses: actions/setup-python@v4
        with:
          python-version: '3.12.7'

      - name: Check Env
        run: python --version

      - name: Install dependencies
        run: |
          pip install mlflow dagshub pandas scikit-learn docker

      - name: Set MLflow Tracking URI
        run: echo "MLFLOW_TRACKING_URI=${{ secrets.MLFLOW_TRACKING_URI }}" >> $GITHUB_ENV

      - name: Train and Build Docker Image
        env:
          MLFLOW_TRACKING_URI: https://dagshub.com/rinimayasari2202/Workflow-CI.mlflow
          MLFLOW_TRACKING_USERNAME: ${{ secrets.MLFLOW_TRACKING_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.MLFLOW_TRACKING_PASSWORD }}
        run: |
          cd MLProject
          
          # 1. Eksekusi script pelatihan (Otomatis menyimpan model secara lokal)
          python modelling.py
          RUN_ID=$(cat run_id.txt)
          echo "Verified Run ID: $RUN_ID"
          
          # 2. Build Docker langsung dari folder 'local_model' (Bypass proses download DagsHub 100%)
          mlflow models build-docker -m "local_model" -n "my-model-image" --env-manager=local
          
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Tag and Push Docker Image
        run: |
          docker tag my-model-image:latest ${{ secrets.DOCKERHUB_USERNAME }}/my-model-image:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/my-model-image:latest
